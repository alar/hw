on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'sbt'
      - name: install sbt
        uses: sbt/setup-sbt@v1
      - name: build
        run: sbt fastLinkJS
      - name: predeploy
        run: |
          mkdir pub
          cp index.html pub/
          cp target/scala-2.12/hw-fastopt/main.js pub/
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: pub
          include-hidden-files: true

      - name: deploy
        uses: actions/deploy-pages@v5.0.0